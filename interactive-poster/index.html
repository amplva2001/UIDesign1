<!DOCTYPE html>
<html>

<head>
  <title>Interactive Poster</title>
  <meta charset="utf-8" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #video-link {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: transparent;
      color: #ffffff;
      border: 1.5px solid #ffffff;
      border-radius: 20px;
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      text-decoration: none;
      z-index: 100;
      transition: background 300ms ease, color 300ms ease;
    }

    #home:hover {
      background: #ffffff;
      color: #000000;
    }
  </style>
</head>

  <a id="home" href="../index.html">Home</a>
