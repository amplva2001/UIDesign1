<!DOCTYPE html>
<html>

<head>
  <title>Interactive Poster</title>
  <meta charset="utf-8" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <video autoplay loop muted playsinline>
    <source src="../assets/photos/Recording_poster.mov" type="video/mp4">
  </video>
</body>

</html>
