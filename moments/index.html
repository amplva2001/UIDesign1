<!DOCTYPE html>
<html>

<head>
  <title>Moments</title>
  <meta charset="utf-8" />
  <style>
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('../fonts/webfonts/JetBrainsMono-Regular.woff2') format('woff2');
      font-weight: 400;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 80px 40px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    #home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: transparent;
      color: #111111;
      border: 1.5px solid #111111;
      border-radius: 20px;
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      text-decoration: none;
      z-index: 100;
      transition: background 300ms ease, color 300ms ease;
    }

    #home:hover {
      background: #111111;
      color: #f0f0f0;
    }
  </style>
</head>

<body>
  <a id="home" href="../index.html">Home</a>
  <img src="../assets/photos/logom.png" alt="Moments logo" />
  <img src="../assets/photos/presentation.png" alt="Presentation" />
  <img src="../assets/photos/prototype.png" alt="Prototype" />
</body>

</html>
