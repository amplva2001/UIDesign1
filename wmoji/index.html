<!DOCTYPE html>
<html>
  <head>
    <title>Emoji gif</title>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('../fonts/webfonts/JetBrainsMono-Regular.woff2') format('woff2');
        font-weight: 400;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background-color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #back {
        position: fixed;
        top: 20px;
        left: 20px;
        background: transparent;
        color: #ffffff;
        border: 1.5px solid #ffffff;
        border-radius: 20px;
        padding: 8px 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        cursor: pointer;
        z-index: 100;
        text-decoration: none;
        transition: background 300ms ease, color 300ms ease;
      }
      #back:hover {
        background: #ffffff;
        color: #000000;
      }
      img {
        max-width: 90vw;
        max-height: 90vh;
      }
    </style>
  </head>
  <body>
    <a id="back" href="../index.html">Home</a>
    <img src="../assets/photos/Jelly 1.gif" alt="wmoji gif" />
  </body>
</html>
